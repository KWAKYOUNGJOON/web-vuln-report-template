<!-- === 4장 상세 결과 ([[finding_id]]) === -->
<section class="report-section print-page-start[[section_extra_classes]] detail-results-section" id="[[section_id]]"[[section_attr]]>
[[section_preamble]]
  <div class="vuln-block vuln-detail[[finding_block_extra_classes]]"[[finding_block_attrs]]>
    <div class="vuln-block-header">
      <span class="auto-field" data-field="finding.id">[[finding_id]]</span>
      <span class="auto-field" data-field="finding.title">[[title]]</span>
      <span class="badge [[risk_badge_class]]" data-risk="[[risk_key]]" data-field="finding.finalRisk">[[risk_label]]</span>
    </div>
    <div class="vuln-block-body vuln-detail-body">
[[continued_label_html]]
[[finding_content_html]]
    </div>
  </div>
</section>
