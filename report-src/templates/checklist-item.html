<tr class="auto-repeat" data-repeat="checklist-item" data-risk="[[risk_key]]">
  <td align="center">[[code]]</td>
  <td>[[name]]</td>
  <td>[[point]]</td>
  <td align="center"><span class="badge [[risk_badge_class]]" data-risk="[[risk_key]]">[[risk_label]]</span></td>
  <td align="center" class="placeholder auto-field" data-field="[[result_field]]">[[result_text]]</td>
</tr>
