<tr class="auto-repeat" data-repeat="summary-finding" data-risk="[[risk_key]]">
  <td align="center">[[number]]</td>
  <td align="center" class="placeholder requires-input auto-field" data-field="summary.finding.system">[[system_name]]</td>
  <td align="center" class="placeholder auto-field" data-field="summary.finding.id">[[finding_id]]</td>
  <td class="placeholder requires-input auto-field" data-field="summary.finding.title">[[title]]</td>
  <td align="center"><span class="badge [[risk_badge_class]]" data-risk="[[risk_key]]">[[risk_label]]</span></td>
  <td align="center" class="placeholder auto-field" data-field="summary.finding.status">[[status]]</td>
</tr>
