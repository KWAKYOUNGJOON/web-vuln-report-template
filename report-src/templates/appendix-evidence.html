<div class="evidence-panel appendix-evidence-panel auto-repeat" data-repeat="appendix-evidence" data-evidence-id="[[evidence_id]]">
  <div class="appendix-evidence-header">
    <span class="evidence-ref">증빙 ID: [[evidence_id]]</span>
    <span class="placeholder auto-field" data-field="appendix.evidence.findingRef">[[finding_ref]]</span>
  </div>
  <div class="appendix-evidence-body">
    <table class="evidence-summary-table">
      <tbody>
        <tr><td>제목</td><td class="placeholder requires-input auto-field" data-field="appendix.evidence.title">[[title]]</td></tr>
        <tr><td>관련 취약점</td><td class="auto-field" data-field="appendix.evidence.findingId">[[finding_id]]</td></tr>
        <tr><td>증빙 구분</td><td class="placeholder auto-field" data-field="appendix.evidence.type">[[evidence_type]]</td></tr>
        <tr><td>본문 참조</td><td class="auto-field" data-field="appendix.evidence.bodyRef">[[body_ref]]</td></tr>
      </tbody>
    </table>
    <div class="evidence-box large">[[box_text]]</div>
    <div class="figure-caption" id="[[figure_id]]" data-toc-key="[[figure_id]]" data-evidence-id="[[evidence_id]]">[[figure_caption]]</div>
    <div class="appendix-evidence-description"><span style="font-weight: bold; font-size: 9pt;">설명: </span><span class="placeholder requires-input auto-field" data-field="appendix.evidence.description">[[description]]</span></div>
  </div>
</div>
